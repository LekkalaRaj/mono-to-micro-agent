apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-service
  labels:
    app: marketing-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketing-service
  template:
    metadata:
      labels:
        app: marketing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8080"
    spec:
      serviceAccountName: marketing-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    10001
        fsGroup:      10001
      containers:
        - name:  marketing-service
          image: registry.bank.internal/marketing-service:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: marketing-service-config
            - secretRef:
                name: marketing-service-secrets
          resources:
            requests: { cpu: "250m",  memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi"   }
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds:       10
            failureThreshold:     3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds:        5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}