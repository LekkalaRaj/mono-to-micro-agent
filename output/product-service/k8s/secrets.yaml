# ⚠️  PLACEHOLDER ONLY — inject real values via HashiCorp Vault / ESO.
# Never commit plaintext credentials.
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secrets
  annotations:
    vault.hashicorp.com/agent-inject:              "true"
    vault.hashicorp.com/role:                      "product-service"
    vault.hashicorp.com/agent-inject-secret-db:    "secret/data/product-service/db"
type: Opaque
# stringData populated at runtime by Vault sidecar